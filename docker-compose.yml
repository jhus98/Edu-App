version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: luminary_postgres
    environment:
      POSTGRES_USER: luminary
      POSTGRES_PASSWORD: luminary
      POSTGRES_DB: luminary
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U luminary']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: luminary_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: luminary_backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://luminary:luminary@postgres:5432/luminary
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
